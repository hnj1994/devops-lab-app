version: "3"

services:

  app:
    build: .
    container_name: devops_app1
    ports:
      - "3000:3000"
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    container_name: devops_mysql1
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: devopsdb
    ports:
      - "3306:3306"

  nginx:
    image: nginx
    container_name: devops_nginx1
    ports:
      - "80:80"
    depends_on:
      - app
